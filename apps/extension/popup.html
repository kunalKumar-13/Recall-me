<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Recall Memory Sync</title>
    <style>
      :root {
        --bg: #fbf7f4;
        --bg-card: #ffffff;
        --ink-bright: #16112b;
        --ink: #4a4458;
        --ink-dim: #847b8e;
        --lavender: #a99cf7;
        --lavender-deep: #8b7fe3;
        --mint: #87deb7;
        --rose: #d67896;
        --hairline: rgba(24, 17, 45, 0.07);
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink-bright);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }
      body {
        width: 280px;
        padding: 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 4px;
      }
      .brand-dot {
        width: 10px;
        height: 10px;
        border-radius: 5px;
        background: linear-gradient(135deg, #b5a8ff, #8b7fe3);
      }
      .tagline {
        color: var(--ink-dim);
        font-size: 11px;
        margin-bottom: 14px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        padding: 8px 10px;
        border-radius: 8px;
        background: var(--bg-card);
        border: 1px solid var(--hairline);
        margin-bottom: 14px;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 4px;
        background: var(--ink-dim);
        flex-shrink: 0;
      }
      .status-dot.ok {
        background: var(--mint);
      }
      .status-dot.warn {
        background: var(--rose);
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 0;
      }
      .toggle-label {
        font-size: 13px;
        font-weight: 500;
      }
      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--lavender-deep);
        cursor: pointer;
      }
      .info {
        font-size: 11px;
        color: var(--ink-dim);
        line-height: 1.5;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--hairline);
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 10.5px;
        background: rgba(169, 156, 247, 0.10);
        padding: 1px 5px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <span class="brand-dot"></span>
      Recall<span style="color: var(--ink-dim); font-weight: 400">.me</span>
    </div>
    <div class="tagline">Memory sync · local only</div>

    <div class="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Checking daemon…</span>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Capture browsing</span>
      <input type="checkbox" id="enabled" />
    </div>

    <div class="info">
      Captured pages are sent only to <code>127.0.0.1:4545</code>, the
      local Recall daemon on this machine. No remote network, no
      telemetry, no accounts.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
