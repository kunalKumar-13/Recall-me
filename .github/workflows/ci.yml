# Recall — CI hygiene
#
# Phase 5D-introduced. Runs on every push and pull request: the
# engine smoke + the two web builds. Catches the four things this
# repo really cares about:
#
#   1. The 35-section smoke still passes (engine + API).
#   2. The marketing site still builds.
#   3. The extension popup still builds.
#   4. Python imports across `app/` + `api/` parse clean.
#
# No telemetry, no secrets, no remote network from Recall itself.
# Each job is single-OS to keep the matrix legible; the smoke is
# Linux because that is the cheapest runner and the engine has no
# OS-specific code on its hot path.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: engine smoke + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install runtime deps
        run: pip install -r requirements.txt

      - name: import-check
        run: |
          python -c "
          import importlib, sys
          mods = [
            'app.core.events', 'app.core.episodic', 'app.core.sessions',
            'app.core.microcontexts', 'app.core.resurfacing',
            'app.core.threads', 'app.core.evolution', 'app.core.recovery',
            'app.core.stats', 'app.core.doctor', 'app.core.ceremonies',
            'api.main',
          ]
          for m in mods:
            importlib.import_module(m)
            print(f'  imported {m}')
          "

      - name: 35-section smoke
        run: python _smoke_api.py

  web:
    name: marketing site build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci || npm install
      - run: npx next build

  extension:
    name: extension popup build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/extension/ui } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/extension/ui/package-lock.json
      - run: npm ci || npm install
      - name: type-check + bundle
        run: npm run build
